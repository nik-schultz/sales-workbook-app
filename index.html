<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sales Workbook</title>

<style>
body { font-family: Arial; background:#f5f7fb; margin:0; }
.wrap { max-width:1200px; margin:40px auto; background:#fff; padding:30px; border-radius:10px; }
h1 { margin-top:0; }
button { background:#0ea5e9; color:#fff; padding:12px; border:none; border-radius:8px; cursor:pointer; width:100%; margin-top:20px;}
input, select { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc;}
.row { display:grid; grid-template-columns:1fr 1fr; gap:15px;}

.summary-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-top:20px;}
.summary-card { background:#f8fafc; padding:15px; border-radius:8px; border:1px solid #ddd;}
.summary-value { font-size:22px; font-weight:bold;}

table { width:100%; border-collapse:collapse; margin-top:10px;}
th, td { padding:8px; border-bottom:1px solid #eee; font-size:13px;}
th { background:#e3f2fd; }

.fresh-row { background:#c6efce;}
.stale-row { background:#ffc7ce;}

.hidden { display:none; }
.section { margin-top:30px;}
</style>
</head>

<body>
<div class="wrap">
<h1>Sales Workbook Builder</h1>

<div class="row">
  <div>
    <label>Branch</label>
    <select id="branch">
      <option>SAN_DIEGO</option>
      <option>TAMPA</option>
      <option>PHOENIX</option>
    </select>
  </div>

  <div>
    <label>Created By</label>
    <input id="createdBy" value="nik"/>
  </div>
</div>

<button id="runBtn">Create Run + Preview</button>

<div id="result"></div>

<div id="resultsArea" class="hidden">

  <div id="summaryGrid" class="summary-grid"></div>

  <div class="section">
    <h2>Main Preview</h2>
    <table id="mainTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Unmatched Marketing</h2>
    <table id="marketingTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Unmatched Boomerang</h2>
    <table id="boomerangTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

</div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<script>

// ---------- HELPERS ----------

function normalizeName(v){
  return String(v||'').toLowerCase()
    .replace(/[^\w\s]/g,'')
    .replace(/\b(apartments|the|at|villas|homes|apt)\b/g,'')
    .replace(/\s+/g,' ')
    .trim();
}

function parseDate(v){
  if(!v) return null;

  if(typeof v === 'number'){
    const d = XLSX.SSF.parse_date_code(v);
    if(d) return new Date(d.y, d.m-1, d.d);
  }

  const d = new Date(v);
  return isNaN(d) ? null : d;
}

function formatDate(d){
  if(!d) return '';
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
}

function daysSince(d){
  if(!d) return null;
  return Math.floor((new Date() - d) / (1000*60*60*24));
}

async function readFile(file){
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
}

// ---------- RENDER ----------

function renderSummary(summary){
  const el = document.getElementById('summaryGrid');
  el.innerHTML = '';

  const items = [
    ['Total', summary.total_clients],
    ['Fresh', summary.fresh_count],
    ['Stale', summary.stale_count],
    ['No Activity', summary.no_activity_count],
    ['Boomerang', summary.boomerang_match_count],
  ];

  items.forEach(i=>{
    const div = document.createElement('div');
    div.className='summary-card';
    div.innerHTML = `<div>${i[0]}</div><div class="summary-value">${i[1]}</div>`;
    el.appendChild(div);
  });
}

function renderTable(id, rows){
  const table = document.getElementById(id);
  const thead = table.querySelector('thead');
  const tbody = table.querySelector('tbody');

  if(!rows.length){
    tbody.innerHTML='';
    return;
  }

  thead.innerHTML = '<tr>' + Object.keys(rows[0]).map(k=>`<th>${k}</th>`).join('') + '</tr>';

  tbody.innerHTML = rows.map(r=>{
    const cls = r.status === 'Fresh' ? 'fresh-row' : r.status === 'Stale' ? 'stale-row' : '';
    return `<tr class="${cls}">
      ${Object.values(r).map(v=>`<td>${v ?? ''}</td>`).join('')}
    </tr>`;
  }).join('');
}

// ---------- MAIN ----------

document.getElementById('runBtn').onclick = async () => {

try {

const clientFile = document.querySelector('#clientFiles')?.files?.[0];
const marketingFile = document.querySelector('#marketingFiles')?.files?.[0];
const boomerangFile = document.querySelector('#boomerangFiles')?.files?.[0];

const clients = clientFile ? await readFile(clientFile) : [];
const marketing = marketingFile ? await readFile(marketingFile) : [];
const boom = boomerangFile ? await readFile(boomerangFile) : [];

const marketingMap = {};
marketing.forEach(r=>{
  const key = normalizeName(r.CustomerName);
  const d = parseDate(r.Date);
  if(!marketingMap[key] || d > marketingMap[key].date){
    marketingMap[key] = {date:d, note:r.Subject};
  }
});

const boomMap = {};
boom.forEach(r=>{
  const key = normalizeName(r.CustomerName);
  boomMap[key] = true;
});

const rows = clients.map(c=>{
  const key = normalizeName(c['Property Name']);
  const m = marketingMap[key];
  const d = m?.date || null;
  const days = daysSince(d);

  let status = 'No Activity';
  if(days !== null) status = days <= 90 ? 'Fresh' : 'Stale';

  return {
    client: c['Property Name'],
    city: c.City,
    units: c['# of Units'],
    last_touch: formatDate(d),
    days,
    status,
    boomerang: boomMap[key] ? 'Yes' : 'No'
  };
});

const summary = {
  total_clients: rows.length,
  fresh_count: rows.filter(r=>r.status==='Fresh').length,
  stale_count: rows.filter(r=>r.status==='Stale').length,
  no_activity_count: rows.filter(r=>r.status==='No Activity').length,
  boomerang_match_count: rows.filter(r=>r.boomerang==='Yes').length
};

renderSummary(summary);
renderTable('mainTable', rows.slice(0,50));

document.getElementById('resultsArea').classList.remove('hidden');

document.getElementById('result').innerText = JSON.stringify(summary,null,2);

} catch(err){
  document.getElementById('result').innerText = err.message;
}

};

</script>
</body>
</html>
